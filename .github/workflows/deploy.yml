# GitHub Actions = "thợ đóng gói" → tạo ra image
# Docker Hub = nhà kho chứa image
# docker-compose = "bản hướng dẫn lắp ráp" → chạy image đó lên VPS
# Jenkins        = "người tự động chạy bản hướng dẫn đó mỗi khi có code mới"

# Workflow này sẽ làm 3 việc khi bạn git push lên branch main
# 1. Checkout source code
# 2. Login DockerHub
# 3. Set up Docker Buildx
# 4. Build image → Push lên DockerHub

name: deploy

on: 
  push:
    branches:
      - main


jobs: 
  deploy: 
    runs-on: ubuntu-24.04
    steps: 
        # bước 1
      - name: Checkout code
        uses: actions/checkout@v4

        # bước 2
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

        # bước 3: docker/build-push-action@v5 yêu cầu Buildx 
        # đây là builder engine mới hơn của Docker, hỗ trợ multi-platform và cache
        # Không có bước này workflow sẽ báo lỗi "buildx not found"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
        # bước 4: 
      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: . # Nơi chứa Dockerfile
          push: true # Đẩy image lên DockerHub
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tiki-fe:latest # Tên image trên DockerHub
                
    