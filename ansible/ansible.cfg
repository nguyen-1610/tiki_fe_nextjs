# ansible.cfg = file cấu hình mặc định cho Ansible
# Ansible tự đọc file này khi chạy playbook

[defaults]
# Khi SSH vào máy lần đầu, Linux hỏi "bạn có tin tưởng host này không?"
# Tắt đi để Ansible không bị treo khi chạy tự động (không có người ngồi gõ "yes")
host_key_checking = False

# User mặc định khi SSH vào VPS — Vultr dùng root
remote_user = root

[ssh_connection]
# Tắt SSH connection sharing và strict host checking
# ControlMaster=no    : không dùng chung SSH connection giữa các lần kết nối
# ControlPersist=no   : không giữ SSH connection sau khi lệnh chạy xong
# StrictHostKeyChecking=no : không hỏi xác nhận host key (giống host_key_checking nhưng ở tầng SSH)
# Cần cả 2 dòng vì host_key_checking là setting của Ansible, StrictHostKeyChecking là setting của SSH
ssh_args = -o ControlMaster=no -o ControlPersist=no -o StrictHostKeyChecking=no
